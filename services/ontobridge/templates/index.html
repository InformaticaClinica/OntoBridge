<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OntoBridge</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: #0056b3;
            color: #fff;
            text-align: center;
            padding: 20px 0;
            font-size: 1.8em;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        h1, h2 {
            color: #0056b3;
            font-size: 1.5em;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
        }

        button {
            background-color: #0056b3;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #003f8a;
        }

        form {
            margin-bottom: 25px;
        }

        .container + .container {
            margin-top: 40px;
        }

        select {
            font-size: 1em;
            height: 40px;
        }

        @media (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 15px;
            }

            h1, h2 {
                font-size: 1.3em;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="header">OntoBridge</div>

<div class="container">
    <h2>SQL Database Connection Parameters</h2>
    <form method="POST" action="create_properties_file">
        <input type="text" name="jdbc_name" placeholder="JDBC Name" required>
        <input type="text" name="jdbc_url" placeholder="JDBC URL" required>
        <input type="text" name="jdbc_user" placeholder="JDBC User" required>
        <input type="password" name="jdbc_password" placeholder="JDBC Password" required>
        <button type="submit">Submit</button>
    </form>
</div>

<div class="container">
    <h1>Generating RDF from Relational Database Data</h1>
    <form method="POST" action="/ontop/clinical">
        <button type="submit">Create Clinical Data RDF</button>
    </form>
    <form method="POST" action="/ontop/local_dic">
        <button type="submit">Create Local Dictionary RDF</button>
    </form>
    <form method="POST" action="/ontop/standard_dic">
        <button type="submit">Create Standard Dictionary RDF</button>
    </form>
    <form method="POST" action="/ontop/mappings">
        <button type="submit">Create Mappings RDF</button>
    </form>
</div>

<div class="container">
    <h1>CDM Table Creation</h1>
    <form method="POST" action="/execute_chosen_model">
        <label for="chosen_model">Select Data Model:</label>
        <select id="chosen_model" name="chosen_model">
            <option value="OMOP_5_3">OMOP 5.3</option>
            <option value="OMOP_5_4">OMOP 5.4</option>
            <option value="OMOP_6_0">OMOP 6.0</option>
            <option value="i2b2">i2b2</option>
            <option value="ISO13606">ISO13606</option>
            <option value="MIMIC_IV">MIMIC-IV</option>
        </select>
        <button type="submit">Create Model Tables</button>
    </form>
</div>

</body>
</html>
